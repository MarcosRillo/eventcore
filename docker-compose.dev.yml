# Development overrides - merged with docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  # Override DB: use env_file instead of required variable
  db:
    env_file: .env.docker
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"

  # Override backend: use Dockerfile.dev, artisan serve, volumes
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    env_file: .env.docker
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - XDEBUG_MODE=${XDEBUG_MODE:-off}
      - XDEBUG_CONFIG=client_host=host.docker.internal
    volumes:
      - ./backend:/var/www
      - ./docker/backend/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
      - composer_cache:/home/www/.composer
    ports:
      - "127.0.0.1:8000:8000"
    entrypoint: ["sh", "/usr/local/bin/entrypoint.sh"]
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Override nginx: move to port 8080 to avoid conflict with artisan serve on 8000
  nginx:
    ports:
      - "8081:80"

  # Override frontend: dev mode with hot reload
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    environment:
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    command: ["pnpm", "run", "dev"]

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: plataforma-calendario-mailhog
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    networks:
      - plataforma-network

volumes:
  composer_cache:
    driver: local
  frontend_node_modules:
    driver: local
  frontend_next:
    driver: local
