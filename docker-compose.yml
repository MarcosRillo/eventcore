services:
  # Base de datos PostgreSQL
  db:
    image: postgres:15.13
    container_name: eventcore-db
    restart: unless-stopped
    env_file: .env.docker
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - plataforma-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plataforma_user -d plataforma_calendario"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # Backend Laravel (PHP-FPM)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eventcore-backend
    restart: unless-stopped
    working_dir: /var/www
    env_file: .env.docker
    environment:
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
    networks:
      - plataforma-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x php-fpm > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # Nginx - Servidor web para Backend API
  nginx:
    image: nginx:1.25-alpine
    container_name: eventcore-nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www:ro
    networks:
      - plataforma-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

  # Frontend Next.js — opt-in via: docker compose --profile frontend-docker up
  frontend:
    profiles: ["frontend-docker"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        INTERNAL_API_URL: http://nginx:80
    container_name: eventcore-frontend
    restart: unless-stopped
    working_dir: /app
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:8000
      INTERNAL_API_URL: http://nginx:80
    ports:
      - "3000:3000"
    networks:
      - plataforma-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # Redis - Cache store
  redis:
    image: redis:7-alpine
    container_name: eventcore-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    networks:
      - plataforma-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} --no-auth-warning ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  db_data:
    driver: local

networks:
  plataforma-network:
    driver: bridge
