services:
  # Base de datos PostgreSQL
  db:
    image: postgres:15.13
    container_name: plataforma-calendario-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plataforma_calendario}
      POSTGRES_USER: ${POSTGRES_USER:-plataforma_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - plataforma-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plataforma_user -d plataforma_calendario"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # Backend Laravel (PHP-FPM)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plataforma-calendario-backend
    restart: unless-stopped
    working_dir: /var/www
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
    networks:
      - plataforma-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x php-fpm > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # Nginx - Servidor web para Backend API
  nginx:
    image: nginx:1.25-alpine
    container_name: plataforma-calendario-nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www:ro
    networks:
      - plataforma-network
    depends_on:
      - backend

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: plataforma-calendario-frontend
    restart: unless-stopped
    working_dir: /app
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    networks:
      - plataforma-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MailHog - SMTP testing server
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: plataforma-calendario-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP port
      - "8025:8025"  # Web UI port
    networks:
      - plataforma-network

volumes:
  db_data:
    driver: local

networks:
  plataforma-network:
    driver: bridge
