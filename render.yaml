# render.yaml - Render Blueprint for backend API
# Docs: https://docs.render.com/blueprint-spec
# Frontend deploys separately on Vercel (no config needed here)

services:
  - type: web
    name: eventcore-api
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./backend/Dockerfile.production
    dockerContext: ./backend
    healthCheckPath: /up
    # Run migrations + seed demo data BEFORE the container starts serving traffic.
    # Seeder is idempotent (skips if events already exist), so safe per deploy.
    preDeployCommand: "php artisan optimize:clear && php artisan cache:clear && php artisan migrate --force && php artisan db:seed --class=DatabaseSeeder --force"
    envVars:
      # --- App ---
      - key: APP_NAME
        value: PlataformaCalendario
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false # Set in dashboard: https://xxx.onrender.com
      - key: APP_KEY
        sync: false # Generate: php artisan key:generate --show

      # --- Database (Neon PostgreSQL) ---
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false # Neon host: ep-xxx.neon.tech
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        sync: false # Neon database name
      - key: DB_USERNAME
        sync: false # Neon username
      - key: DB_PASSWORD
        sync: false # Neon password
      - key: DB_SSLMODE
        value: require

      # --- Cache (Postgres-backed via Neon) ---
      # NOTE: Originally Redis (Upstash). The Upstash database was deleted by
      # the provider after long inactivity, causing 500s on every public endpoint
      # (Cache::tags() calls failed DNS resolution). Switched to database cache as
      # hotfix — performance is fine at current scale. To restore Redis later see
      # OPS-046.
      - key: CACHE_STORE
        value: database
      # Redis env vars retained for future restoration (set in dashboard, unused for now).
      - key: REDIS_URL
        sync: false # Upstash URL: rediss://default:xxx@xxx.upstash.io:6379
      - key: REDIS_CLIENT
        value: phpredis

      # --- CORS / Sanctum ---
      - key: FRONTEND_URL
        sync: false # Vercel URL: https://xxx.vercel.app
      - key: SANCTUM_STATEFUL_DOMAINS
        sync: false # Vercel domain: xxx.vercel.app

      # --- Session ---
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_ENCRYPT
        value: "true"
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_SAME_SITE
        value: none

      # --- Cloudinary Image Storage ---
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # --- Logging ---
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: warning
